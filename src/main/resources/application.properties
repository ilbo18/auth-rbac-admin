# app
spring.application.name=auth-rbac-admin

# 서버
server.port=8080

# 데이터베이스
spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT 설정
security.jwt.secret-key=auth-rbac-admin-local-secret-key-change-me-1234567890
security.jwt.access-token-expiration-seconds=3600
